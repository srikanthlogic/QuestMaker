name: Deploy Vite SPA to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Vite
        env:
          # Ensure correct base path for repo: my-username/QuestMaker
          VITE_BASE: /QuestMaker/
        run: |
          # If vite.config.ts uses `base: process.env.VITE_BASE ?? '/'`, this will set the proper base for Pages.
          # If not, we can still pass `--base` to vite build as a fallback flag.
          if grep -q "base:" vite.config.ts; then
            npm run build
          else
            npx vite build --base "/QuestMaker/"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4