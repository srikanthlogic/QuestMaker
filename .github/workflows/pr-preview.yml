name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    if: ${{ github.event.action != 'closed' }}
    name: Build and Deploy PR Preview
    runs-on: ubuntu-latest
    env:
      PREVIEW_SUBDOMAIN: pr-${{ github.event.pull_request.number }}
      PREVIEW_DIR: dist
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine package manager
        id: detect-pm
        shell: bash
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "pm=pnpm" >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "pm=yarn" >> $GITHUB_OUTPUT
          else
            echo "pm=npm" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ steps.detect-pm.outputs.pm }}
          cache-dependency-path: |
            **/package-lock.json
            **/pnpm-lock.yaml
            **/yarn.lock

      - name: Install pnpm
        if: ${{ steps.detect-pm.outputs.pm == 'pnpm' }}
        run: npm i -g pnpm@9

      - name: Install dependencies
        run: |
          if [ "${{ steps.detect-pm.outputs.pm }}" = "pnpm" ]; then pnpm i --frozen-lockfile; \
          elif [ "${{ steps.detect-pm.outputs.pm }}" = "yarn" ]; then yarn --frozen-lockfile; \
          else npm ci; fi

      - name: Build
        env:
          VITE_GEMINI_API_KEY: ""
          CI: true
        run: |
          if [ "${{ steps.detect-pm.outputs.pm }}" = "pnpm" ]; then pnpm run build; \
          elif [ "${{ steps.detect-pm.outputs.pm }}" = "yarn" ]; then yarn build; \
          else npm run build; fi

      - name: Prepare Pages artifact (with PR-specific base)
        shell: bash
        run: |
          # If using Vite, ensure base path works for GH Pages previews under /pr-<num>/
          # Attempt to inject a base href if index.html exists in dist.
          mkdir -p ${{ env.PREVIEW_DIR }}
          if [ -f "${{ env.PREVIEW_DIR }}/index.html" ]; then
            PR_BASE="/pr-${{ github.event.pull_request.number }}/"
            # Inject <base href> if not present to allow relative assets to resolve
            if ! grep -q "<base " "${{ env.PREVIEW_DIR }}/index.html"; then
              sed -i "s|<head>|<head><base href=\"${PR_BASE}\">|g" "${{ env.PREVIEW_DIR }}/index.html"
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PREVIEW_DIR }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Compute preview URL
        id: url
        run: |
          # pages url like https://owner.github.io/repo
          BASE_URL="${{ steps.deployment.outputs.page_url }}"
          # Ensure trailing slash
          case "$BASE_URL" in
            */) ;;
            *) BASE_URL="${BASE_URL}/" ;;
          esac
          PREVIEW_PATH="pr-${{ github.event.pull_request.number }}/"
          echo "url=${BASE_URL}${PREVIEW_PATH}" >> $GITHUB_OUTPUT

      - name: Comment on PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const { number } = context.payload.pull_request;
            const url = core.getInput('url', { required: false }) || process.env.PREVIEW_URL || '${{ steps.url.outputs.url }}';
            const body = [
              '🚀 Preview deployment ready:',
              '',
              `• URL: ${url}`,
              `• Commit: ${context.sha.substring(0,7)}`,
              `• Status: ✅ Built and deployed`
            ].join('\n');
            // Upsert a comment identified by a hidden marker to allow updates
            const marker = '<!-- pr-preview-link -->';
            const list = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: number
            });
            const prev = list.data.find(c => c.body && c.body.includes(marker));
            if (prev) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: prev.id,
                body: `${marker}\n${body}`
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body: `${marker}\n${body}`
              });
            }
        env:
          PREVIEW_URL: ${{ steps.url.outputs.url }}

  cleanup-preview:
    if: ${{ github.event.action == 'closed' }}
    name: Cleanup PR Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create empty artifact for removal
        run: |
          mkdir -p empty && echo "This preview was removed because the PR was closed." > empty/index.html

      - name: Upload empty artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: empty

      - name: Deploy empty artifact (effectively removing preview path)
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on PR about cleanup
        uses: actions/github-script@v7
        with:
          script: |
            if (!context.payload.pull_request) return;
            const { number, merged } = context.payload.pull_request;
            const status = merged ? 'merged' : 'closed';
            const body = [
              '<!-- pr-preview-link -->',
              `🧹 Preview deployment removed because PR was ${status}.`
            ].join('\n');
            const list = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: number
            });
            const prev = list.data.find(c => c.body && c.body.includes('<!-- pr-preview-link -->'));
            if (prev) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: prev.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body
              });
            }